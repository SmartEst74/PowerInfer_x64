global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'powerinfer-dev'
    environment: 'development'

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # PowerInfer_x64 metrics endpoint
  - job_name: 'powerinfer'
    static_configs:
      - targets: ['powerinfer:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node Exporter (host metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
