name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test both CPU-only and CUDA builds where possible
        features: [[], ["cuda"]]
    steps:
      - name: Install CUDA (for CUDA feature)
        if: contains(matrix.features, 'cuda')
        uses: Jimver/cuda-toolkit@v0
        with:
          cuda: '11.8.0'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly-2025-06-23 --profile minimal
          rustup default nightly-2025-06-23
          rustup component add rust-src rustc-dev llvm-tools-preview
        env:
          RUSTUP_INIT_SKIP_PATH_CHECK: 1

      - name: Install rust-gpu (for CUDA builds)
        if: contains(matrix.features, 'cuda')
        run: |
          cargo install --git https://github.com/rust-gpu/rust-gpu.git --rev main rust-gpu
          cargo install --git https://github.com/rust-gpu/rust-gpu.git --rev main rustc_codegen_nvvm

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (no features)
        run: cargo build --release --locked --all-targets
        env:
          CUDA_PATH: /usr/local/cuda-11.8

      - name: Build with features
        if: contains(matrix.features, 'cuda')
        run: cargo build --release --locked --features ${{ join(matrix.features, ' ') }}
        env:
          CUDA_PATH: /usr/local/cuda-11.8

      - name: Run tests
        run: cargo test --release --locked --all-features -- --nocapture

      - name: Run clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build Docker image (on push only)
        if: github.event_name == 'push'
        run: |
          docker build -f Dockerfile.cuda -t powerinfer:latest .
          docker images | grep powerinfer

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly-2025-06-23 --profile minimal
          rustup default nightly-2025-06-23
          rustup component add rust-src rustc-dev llvm-tools-preview
        env:
          RUSTUP_INIT_SKIP_PATH_CHECK: 1

      - name: Install CUDA
        uses: Jimver/cuda-toolkit@v0
        with:
          cuda: '11.8.0'

      - name: Install rust-gpu
        run: |
          cargo install --git https://github.com/rust-gpu/rust-gpu.git --rev main rust-gpu
          cargo install --git https://github.com/rust-gpu/rust-gpu.git --rev main rustc_codegen_nvvm

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build benchmark binary
        run: cargo build --release --features cuda --benches

      - name: Download test model (small)
        run: |
          mkdir -p models
          # Placeholder: would download a small GGUF model
          echo "Model download would happen here" > models/placeholder.txt

      - name: Run benchmarks
        run: |
          cargo bench --features cuda -- --output-format json > bench_results.json || true
          cat bench_results.json

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench_results.json
