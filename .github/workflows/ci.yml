  #         cargo install --git https://github.com/rust-gpu/rust-gpu.git --rev main rust-gpu
  #         cargo install --git https://github.com/rust-gpu/rust-gpu.git --rev main rustc_codegen_nvvm
  #     - name: Build with CUDA
  #       run: cargo build --release --features cuda

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-06-23
          components: rust-src,rustc-dev,llvm-tools-preview

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build benchmark binary
        run: cargo build --release --benches

      - name: Run benchmarks
        run: |
          cargo bench -- --output-format json > bench_results.json || true
          cat bench_results.json

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench_results.json
